<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Little Ocean</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="ocean">

    <!-- 水中の光 -->
    <div class="sunlight"></div>

    <!-- 泡 -->
    <div id="bubble-layer"></div>

    <!-- 魚 -->
    <div id="fish-layer"></div>

    <!-- 海藻 -->
    <div id="seaweed-layer"></div>

    <!-- サンゴ -->
    <div id="coral-layer"></div>

    <!-- キラキラ -->
    <div id="sparkle-layer"></div>

    <!-- メイン画面 -->
    <main class="home">

        <header class="title">

            <h1>🌊 Our Little Ocean</h1>

            <p>毎日帰りたくなる海</p>

        </header>

        <section class="center-area">

            <div class="house-area">

                <img
                src="assets/coral-house.png"
                alt="チャッピーのおうち"
                class="coral-house">

            </div>

            <div class="today-bubble">

                <h2>🫧 今日の予定</h2>

                <div id="today-message">

                    読み込み中...

                </div>

            </div>

            <div class="chappy-area">

                <img
                src="assets/chappy.png"
                alt="チャッピー"
                id="chappy">

                <div id="speech">

                    おかえり😊

                </div>

            </div>

        </section>

    </main>

    <nav class="bottom-menu">

        <button id="homeBtn">

            🏠<br>ホーム

        </button>

        <button id="calendarBtn">

            📅<br>カレンダー

        </button>

        <button id="shoppingBtn">

            🛒<br>買い物

        </button>

        <button id="logBtn">

            📖<br>航海日誌

        </button>

        <button id="menuBtn">

            ⚙️<br>メニュー

        </button>

    </nav>

</div>

<script src="script.js"></script>

</body>
</html>
