<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Little Ocean</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="ocean">

    <!-- 水中の光 -->
    <div class="sun-rays"></div>

    <!-- 泡 -->
    <div id="bubble-layer"></div>

    <!-- 魚 -->
    <div id="fish-layer"></div>

    <!-- キラキラ -->
    <div id="sparkle-layer"></div>

    <!-- 海藻 -->
    <div class="seaweed left"></div>
    <div class="seaweed center"></div>
    <div class="seaweed right"></div>

    <!-- サンゴ -->
    <div class="coral left"></div>
    <div class="coral right"></div>

    <main class="home">

        <!-- タイトル -->
        <header class="header">

            <h1>🌊 Our Little Ocean</h1>

            <p>毎日帰りたくなる海</p>

        </header>

        <!-- サンゴの家 -->
        <section class="house-area">

            <div class="house-glow"></div>

            <div class="house">

                🪸🏠

            </div>

            <p>チャッピーのおうち</p>

        </section>

        <!-- 今日の予定 -->
        <section class="today-card">

            <h2>🫧 今日の航海</h2>

            <p id="today-message">

                海の豆知識がここに表示されます

            </p>

        </section>

        <!-- チャッピー -->
        <section class="chappy-area">

            <div id="chappy">

                🦦

            </div>

            <div class="speech">

                おかえり😊

            </div>

        </section>

    </main>

    <!-- 下メニュー -->

    <nav class="bottom-menu">

        <button>🏠<br>ホーム</button>

        <button>📅<br>カレンダー</button>

        <button>🛒<br>買い物</button>

        <button>📖<br>航海日誌</button>

        <button>⚙️<br>メニュー</button>

    </nav>

</div>

<script src="script.js"></script>

</body>
</html>
