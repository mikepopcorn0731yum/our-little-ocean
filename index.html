<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Little Ocean | 伊藤家の食卓</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>🌊 Our Little Ocean</h1>

<p>伊藤家の食卓</p>

<span>〜家族3人の航海日誌〜</span>

</header>



<main>


<section class="today">

<h2>⚓ 今日の航海</h2>

<p id="today-date"></p>

</section>



<section class="family">

<h2>👨‍👩‍👦 家族の予定</h2>


<div class="member john">

🐢 ジョン

<p>予定を追加できます</p>

</div>



<div class="member kana">

🐋 かなちゃん

<p>予定を追加できます</p>

</div>



<div class="member naru">

🐡 なるくん

<p>予定を追加できます</p>

</div>


</section>





<section class="calendar-area">


<h2>📅 海のカレンダー</h2>



<div class="calendar-header">

<button id="prev-month">
⬅
</button>


<h3 id="calendar-title"></h3>


<button id="next-month">
➡
</button>


</div>




<div class="week">

<div>日</div>
<div>月</div>
<div>火</div>
<div>水</div>
<div>木</div>
<div>金</div>
<div>土</div>

</div>



<div id="calendar">

</div>



</section>


</main>



<footer>

<p>
🐢 ジョン　🐋 かなちゃん　🐡 なるくん
</p>

</footer>
