<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Little Ocean</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="ocean">

  <header class="header">
    <h1>🌊 Our Little Ocean</h1>
    <p>毎日帰りたくなる海</p>
  </header>

  <main>

    <section class="hero">

      <div class="today-bubble">
        <h2>🫧 今日の予定</h2>

        <div id="today-message">
          今日は特別な予定はありません😊<br>
          海の豆知識：ラッコは寝るとき海藻に包まって流されないようにするよ🌿
        </div>
      </div>

      <div class="coral-home">

        <div class="house">
          🪸🏠
        </div>

        <p>チャッピーのおうち</p>

      </div>

      <div class="chappy-area">

        <div id="chappy">
          🦦
        </div>

        <div class="speech">
          おかえり😊
        </div>

      </div>

    </section>

  </main>

  <nav class="bottom-menu">

    <button id="homeBtn">
      🏠<br>ホーム
    </button>

    <button id="calendarBtn">
      📅<br>カレンダー
    </button>

    <button id="shoppingBtn">
      🛒<br>買い物
    </button>

    <button id="logBtn">
      📖<br>航海日誌
    </button>

    <button id="menuBtn">
      ⚙️<br>メニュー
    </button>

  </nav>

</div>

<script src="script.js"></script>

</body>
</html>
